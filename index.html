<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>互動式日曆</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        
        /* 日曆表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: #888; font-weight: normal; padding: 10px; }
        td { padding: 10px; border-radius: 10px; transition: 0.3s; }
        
        /* 「今天」的高亮樣式 */
        .today { background-color: #ff4757 !important; color: white !important; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); }
        .day:hover { background-color: #f1f2f6; }
        
        /* 按鈕樣式 */
        .nav-btn { text-decoration: none; color: #3498db; font-size: 1.2rem; padding: 5px 15px; border: 1px solid #3498db; border-radius: 5px; transition: 0.3s; }
        .nav-btn:hover { background: #3498db; color: white; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <p style="color: #7f8c8d; font-size: 0.9rem;">{{ msg }}</p>
        
        <div class="header-flex">
            <a href="/?y={{prev_y}}&m={{prev_m}}" class="nav-btn">＜</a>
            <h2 style="margin: 0;">{{ view_title }}</h2>
            <a href="/?y={{next_y}}&m={{next_m}}" class="nav-btn">＞</a>
        </div>

        <div class="calendar-box">
            {{ calendar_html | safe }}
        </div>
    </div>
</body>
</html>
